global:
  resolve_timeout: 5m

route:
  receiver: pagerduty
  group_by: ['alertname', 'pod', 'namespace']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: pagerduty
    pagerduty_configs:
      - routing_key: "API-KEY"
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'
