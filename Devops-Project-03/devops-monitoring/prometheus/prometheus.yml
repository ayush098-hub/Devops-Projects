global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    cluster: "minikube"
    environment: "dev"

rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "todo-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "192.168.49.2:30080"   # replace

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "192.168.49.2:32090"   # replace
  - job_name: "kube-state-metrics"
    static_configs:
      - targets:
          - "192.168.49.2:32100"
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093
